name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_BRANCH_TEST_URL: postgresql://postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... -count=1
      - name: go build
        run: go build ./...

  bench:
    name: bench
    # Run on demand and on main pushes — skip on PRs so we don't pay ~5 min
    # of Postgres-bound work on every review. Use workflow_dispatch to trigger
    # manually before/after perf-sensitive changes.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_BRANCH_TEST_URL: postgresql://postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: run benchmarks
        run: |
          go test -tags=bench -bench=. -benchtime=1x -run=^$ -timeout=15m \
            ./internal/diff ./internal/merge ./internal/branch \
            | tee bench-results.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-results.txt
